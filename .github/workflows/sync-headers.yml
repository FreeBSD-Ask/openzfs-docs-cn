name: 🔗 从 SUMMARY.md 更新一级标题

on:
  push:
  workflow_run:
    workflows: [🔗 从 SUMMARY.md 更新目录]
    types:
      - completed
  workflow_dispatch:

jobs:
  verify-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Sync headers
        id: sync
        run: |
          export LC_ALL=C.UTF-8
          CHANGED="false"

          # 读取 SUMMARY.md 中的 Markdown 链接
          while IFS= read -r line; do
            # 使用正则提取标题和路径，允许空格
            if [[ $line =~ \*\ *\[(.+)\]\((.+)\) ]]; then
              title="${BASH_REMATCH[1]}"
              path="${BASH_REMATCH[2]}"

              # 如果文件不存在则跳过
              [ ! -f "$path" ] && continue

              # 获取文件第一行并清理格式
              first_line=$(head -n 1 "$path" | sed 's/^#*//; s/^[[:space:]]*//; s/[[:space:]]*$//')
              clean_title=$(echo "$title" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')

              # 比较并更新
              if [ "$first_line" != "$clean_title" ]; then
                echo "Updating $path: '$first_line' -> '$clean_title'"
                temp_file=$(mktemp)
                echo "# $clean_title" > "$temp_file"
                tail -n +2 "$path" >> "$temp_file"
                mv -f "$temp_file" "$path"
                git add "$path"
                CHANGED="true"
              fi
            fi
          done < SUMMARY.md

          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Commit changes
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config --global user.name "ykla"
          git config --global user.email "yklaxds@gmail.com"
          git commit -m "chore: sync headers with SUMMARY.md"
          git push
